services:
  # ===================
  # PostgreSQL Database
  # ===================
  postgres:
    image: postgres:16-alpine
    container_name: todo-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      POSTGRES_DB: ${DB_NAME:-todo_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - todo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-todo_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================
  # NestJS Application
  # ===================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: todo-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      CI: "true"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - todo-network
    command: sh -c "pnpm install --frozen-lockfile && pnpm run migration:run && pnpm run start:dev"

# ===================
# Networks
# ===================
networks:
  todo-network:
    driver: bridge

# ===================
# Volumes
# ===================
volumes:
  postgres_data:
    driver: local
